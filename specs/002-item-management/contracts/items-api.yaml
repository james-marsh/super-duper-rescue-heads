openapi: 3.0.3
info:
  title: Super Duper Rescue Heads - Items API
  description: RESTful API for managing items within collections
  version: 1.0.0
servers:
  - url: https://api.superduperrescueheads.com/api/v1
    description: Production
  - url: http://localhost:5000/api/v1
    description: Development

tags:
  - name: Items
    description: Item management operations

security:
  - BearerAuth: []

paths:
  /collections/{collectionId}/items:
    get:
      tags: [Items]
      summary: List items in a collection
      operationId: listItems
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: skip
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: take
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ItemResponse'
                  pagination:
                    $ref: '#/components/schemas/PaginationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Items]
      summary: Add item to collection
      operationId: createItem
      parameters:
        - name: collectionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Item limit exceeded
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /items/{itemId}:
    get:
      tags: [Items]
      summary: Get item by ID
      operationId: getItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Items]
      summary: Update item
      operationId: updateItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Items]
      summary: Delete item
      operationId: deleteItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ItemResponse:
      type: object
      required:
        - itemId
        - collectionId
        - name
        - attributes
        - createdAt
        - updatedAt
      properties:
        itemId:
          type: string
          format: uuid
        collectionId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 200
        notes:
          type: string
          nullable: true
          maxLength: 1000
        attributes:
          type: object
          additionalProperties: true
          description: Type-specific attributes (artist/album for vinyl, issue number for comics, etc.)
        acquisitionDate:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateItemRequest:
      type: object
      required:
        - name
        - attributes
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        notes:
          type: string
          maxLength: 1000
        attributes:
          type: object
          additionalProperties: true
          description: Type-specific attributes based on collection's item type
        acquisitionDate:
          type: string
          format: date-time

    UpdateItemRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        notes:
          type: string
          maxLength: 1000
        attributes:
          type: object
          additionalProperties: true

    PaginationResponse:
      type: object
      properties:
        total:
          type: integer
        skip:
          type: integer
        take:
          type: integer
        hasMore:
          type: boolean

    ProblemDetails:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: Forbidden
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Not Found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
